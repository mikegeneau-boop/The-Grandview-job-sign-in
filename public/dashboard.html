<!DOCTYPE html><html><body>
<h2>On Site</h2><div id="c"></div>
<script>
function load(){
 fetch('/status').then(r=>r.json()).then(d=>{
   const c=document.getElementById('c');
   if(d.length===0){c.innerHTML="SITE IS EMPTY";return;}
   c.innerHTML="";
   const g={};
   d.forEach(p=>{
     if(!g[p.company])g[p.company]=[];
     g[p.company].push(p);
   });
   for(let k in g){
     let html="<h3>"+k+" ("+g[k].length+")</h3><ul>";
     g[k].forEach(p=>html+="<li>"+p.name+" - "+p.trade+"</li>");
     html+="</ul>";
     c.innerHTML+=html;
   }
 });
}
setInterval(load,5000);load();
</script>
</body></html>
