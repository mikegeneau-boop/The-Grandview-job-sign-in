<!DOCTYPE html><html><head><meta name='viewport' content='width=device-width, initial-scale=1'><style>body{font-family:Arial;padding:20px;}.company{margin-top:20px;}</style></head><body><h2>Currently On Site</h2><div id='content'></div><script>function load(){fetch('/status').then(res=>res.json()).then(data=>{const container=document.getElementById('content');container.innerHTML='';const groups={};data.forEach(person=>{if(!groups[person.company]){groups[person.company]=[];}groups[person.company].push(person.name);});for(const company in groups){const div=document.createElement('div');div.className='company';const title=document.createElement('h3');title.innerText=`${company} (${groups[company].length})`;div.appendChild(title);const ul=document.createElement('ul');groups[company].forEach(name=>{const li=document.createElement('li');li.innerText=name;ul.appendChild(li);});div.appendChild(ul);container.appendChild(div);}});}setInterval(load,5000);load();</script></body></html>
