<!DOCTYPE html><html><head><style>body{font-family:Arial;padding:20px;background:#f5f5f5;}#container{max-width:800px;margin:0 auto;background:white;padding:20px;border-radius:10px;}input,button{padding:10px 15px;font-size:16px;border:1px solid #ddd;border-radius:5px;margin-right:10px;}button{background:#4CAF50;color:white;cursor:pointer;border:none;}button:hover{background:#45a049;}#app{display:none;}table{width:100%;border-collapse:collapse;margin-top:20px;}th{background:#4CAF50;color:white;padding:12px;text-align:left;cursor:pointer;user-select:none;}th:hover{background:#45a049;}td{padding:12px;border-bottom:1px solid #ddd;}tr:hover{background:#f5f5f5;}.delete-btn{background:#f44336;color:white;border:none;padding:8px 12px;cursor:pointer;border-radius:3px;}.delete-btn:hover{background:#da190b;}</style></head><body><div id="container"><h2>Manager Dashboard</h2><input id="pw" placeholder="Password" type="password"><button onclick="login()">Enter</button><div id="app"><h3>Sign-In/Out Logs</h3><table border="1" id="t"></table></div></div><script>let sortColumn=-1;let sortAsc=true;function login(){fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('pw').value})}).then(r=>r.json()).then(d=>{if(d.success){document.getElementById('app').style.display='block';load();}else alert("Wrong password");});} function load(){fetch('/logs').then(r=>r.json()).then(data=>{let html="<tr><th onclick=\"sort(0)\">Name ▼</th><th onclick=\"sort(1)\">Company ▼</th><th onclick=\"sort(2)\">Trade ▼</th><th onclick=\"sort(3)\">Action ▼</th><th onclick=\"sort(4)\">Time ▼</th><th>Delete</th></tr>";data.forEach((r,i)=>{const time=r.time?new Date(r.time).toLocaleString():'N/A';html+=`<tr><td>${r.name}</td><td>${r.company}</td><td>${r.trade}</td><td>${r.action}</td><td>${time}</td><td><button class=\"delete-btn\" onclick=\"del(${i})\">X</button></td></tr>`;});document.getElementById('t').innerHTML=html;});} function sort(col){sortColumn===col?sortAsc=!sortAsc:sortAsc=true;sortColumn=col;fetch('/logs').then(r=>r.json()).then(data=>{data.sort((a,b)=>{let aVal,bVal;if(col===0){aVal=a.name;bVal=b.name;}else if(col===1){aVal=a.company;bVal=b.company;}else if(col===2){aVal=a.trade;bVal=b.trade;}else if(col===3){aVal=a.action;bVal=b.action;}else if(col===4){aVal=new Date(a.time);bVal=new Date(b.time);}return sortAsc?aVal>bVal?1:-1:aVal<bVal?1:-1;});let html="<tr><th onclick=\"sort(0)\">Name "+(sortColumn===0?(sortAsc?'▲':'▼'):' ▼')+"</th><th onclick=\"sort(1)\">Company "+(sortColumn===1?(sortAsc?'▲':'▼'):' ▼')+"</th><th onclick=\"sort(2)\">Trade "+(sortColumn===2?(sortAsc?'▲':'▼'):' ▼')+"</th><th onclick=\"sort(3)\">Action "+(sortColumn===3?(sortAsc?'▲':'▼'):' ▼')+"</th><th onclick=\"sort(4)\">Time "+(sortColumn===4?(sortAsc?'▲':'▼'):' ▼')+"</th><th>Delete</th></tr>";data.forEach((r,i)=>{const time=r.time?new Date(r.time).toLocaleString():'N/A';html+=`<tr><td>${r.name}</td><td>${r.company}</td><td>${r.trade}</td><td>${r.action}</td><td>${time}</td><td><button class=\"delete-btn\" onclick=\"del(${i})\">X</button></td></tr>`;});document.getElementById('t').innerHTML=html;});} function del(i){fetch('/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({index:i})}).then(load);} </script></body></html>
