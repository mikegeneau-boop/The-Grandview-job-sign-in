<!DOCTYPE html><html><head><meta name='viewport' content='width=device-width, initial-scale=1'><style>body{font-family:Arial;text-align:center;padding:20px;}input,select,button{width:90%;padding:15px;margin:10px;font-size:18px;}</style></head><body><h2>Job Site Sign-In / Sign-Out</h2><input id='name' placeholder='Full Name'/><select id='company'><option value=''>Select Trade</option><option>Drywall</option><option>Electrical</option><option>Plumbing</option><option>HVAC</option><option>Framing</option><option>Concrete</option></select><button onclick="send('Sign In')">SIGN IN</button><button onclick="send('Sign Out')">SIGN OUT</button><p id='msg'></p><script>function send(action){const name=document.getElementById('name').value;const company=document.getElementById('company').value;if(!name){alert('Enter name');return;}fetch('/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,company,action})}).then(()=>{document.getElementById('msg').innerText='Recorded: '+action;document.getElementById('name').value='';});}</script></body></html>
