<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;text-align:center;padding:20px;}
input,select,button{width:90%;padding:15px;margin:10px;font-size:18px;}
.signin{background:#ffd700;}
.signout{background:#ff4d4d;color:white;}
</style></head><body>

<h2>Lanca Job Site Sign-In</h2>

<input id="name" placeholder="Full Name">
<input id="company" placeholder="Company">

<select id="trade"></select>

<button class="signin" onclick="send('Sign In')">SIGN IN</button>
<button class="signout" onclick="send('Sign Out')">SIGN OUT</button>

<p id="msg"></p>

<script>
const trades = ["Lanca","Visitor/Other","Drywall","Electrical","Plumbing","HVAC","Framing","Concrete"];

const select = document.getElementById('trade');
trades.forEach(t=>{
  const o=document.createElement('option');
  o.text=t;
  select.add(o);
});

function send(action){
  const name=document.getElementById('name').value;
  const company=document.getElementById('company').value;
  const trade=document.getElementById('trade').value;

  fetch('/log',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,company,trade,action})
  }).then(()=>{
    document.getElementById('msg').innerText="Saved";
  });
}
</script>
</body></html>
